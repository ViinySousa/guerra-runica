<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crônicas da Guerra Rúnica</title>

  <link rel="icon" href="images/favicon.ico" type="image/x-icon">

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/hero.css">

</head>
<body>

  <!-- ═══════════════════════════════════
       NAVBAR
  ═══════════════════════════════════ -->
  <header class="navbar" id="navbar">
    <div class="navbar__brand">
      <img src="images/logo.png" alt="Símbolo Rúnico" class="navbar__logo-img">
      <div class="navbar__logo-text">
        <span class="navbar__logo-main">RPG</span>
        <span class="navbar__logo-main">O retorno</span>
      </div>
    </div>

    <nav class="navbar__nav">
      <a href="#historia" class="navbar__link">A História</a>
      <a href="#Personagens" class="navbar__link">Personagens</a>
      <a href="#Missões" class="navbar__link">Missões</a>
      <a href="#mestre"   class="navbar__link">Guia do Mestre</a>
      <a href="#midia"    class="navbar__link">Mídia</a>
    </nav>

    <div class="navbar__social">
      <a href="#" class="navbar__social-link" aria-label="Discord">
        <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
          <path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/>
        </svg>
      </a>
      
    </div>
  </header>

  <!-- ═══════════════════════════════════
       HERO SECTION
  ═══════════════════════════════════ -->
  <section class="hero" id="hero">

    <!-- Imagem de fundo — coloque sua arte em images/hero-bg.jpg -->
    <div class="hero__bg">
      <video autoplay muted loop playsinline class="hero__bg-video">
        <source src="video/video-hero.mp4" type="video/mp4">
        Seu navegador não suporta vídeos.
      </video>
      <div class="hero__bg-overlay"></div>
    </div>

    <!-- Partículas decorativas -->
    <div class="hero__particles" aria-hidden="true">
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
    </div>

    <!-- Conteúdo central -->
    <div class="hero__content">

      <div class="hero__title-group">
        <p class="hero__pretitle">Crônicas da</p>
        <h1 class="hero__title">
          <span class="hero__title-line">Guerra</span>
          <span class="hero__title-line">Rúnica</span>
        </h1>
      </div>

      <div class="hero__divider" aria-hidden="true"></div>

      <p class="hero__subtitle">
        O Cataclisma Rúnico despedaçou o mundo.<br>
        A escuridão não espera por heróis.
      </p>

      <button class="hero__cta" id="btnCarta">
        Ler a Mensagem
      </button>
    </div>
  
    <button id="btnAudioToggle" class="hero__audio-btn" aria-label="Ativar ou desativar som ambiente">
      <svg id="icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
        <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
        <line x1="23" y1="9" x2="17" y2="15"></line>
        <line x1="17" y1="9" x2="23" y2="15"></line>
      </svg>
      <svg id="icon-unmuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24" style="display: none;">
        <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
    </button>
    

  </section>

  <div class="modal" id="modalCarta" role="dialog" aria-modal="true">
    <div class="modal__backdrop" id="modalBackdrop"></div>
    
    <div class="modal__container">
      <button class="modal__close" id="modalClose" aria-label="Fechar">✕</button>
      <img src="images/carta-bg.jpeg" alt="Carta de Thorin" class="modal__image">
      
      </div>
  </div>

  <!-- JS -->
  <script src="js/hero.js"></script>
</body>
</html>
